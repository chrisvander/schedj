services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: schedj
      POSTGRES_USER: schedj
      POSTGRES_PASSWORD: schedj
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schedj -d schedj"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  postgres-data:
